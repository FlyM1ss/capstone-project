services:
  db:
    image: paradedb/paradedb:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deloitte}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deloitte_dev}
      POSTGRES_DB: ${POSTGRES_DB:-search_engine}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deloitte -d search_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

  embedding:
    build:
      context: .
      dockerfile: embedding.Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./docker-data/hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      EMBEDDING_API_URL: ${EMBEDDING_API_URL}
      COHERE_API_KEY: ${COHERE_API_KEY}
    volumes:
      - ./backend:/app
      - ./data:/data
      - ./docker-data/model_cache:/root/.EasyOCR
    depends_on:
      db:
        condition: service_healthy
      embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./Fetch
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./Fetch:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
